<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אנפי - ניהול בלוג</title>
    <link rel="icon" type="image/png" href="../../קטלוג דיגיטלי/catalog/favicon.png">
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        #admin-panel {
            display: none;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 2rem;
            border-radius: 20px;
            width: 80%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

<header>
    <div style="margin-bottom: 1rem;">
        <a href="../index.html" class="btn btn-small" style="background: white; color: var(--primary); border: 2px solid var(--accent); text-decoration: none;">&rarr; חזרה לבלוג</a>
    </div>
    <h1>ניהול הבלוג של אנפי</h1>
    <p>ממשק לניהול פוסטים</p>
</header>

<main class="container">
    <!-- Login Area -->
    <div id="login-area" class="login-container">
        <h2>כניסה למערכת</h2>
        <div class="form-group">
            <label for="password">סיסמה</label>
            <input type="password" id="password" class="form-control" placeholder="הכנס סיסמה">
        </div>
        <button id="login-btn" class="btn btn-primary" style="width: 100%;">כניסה</button>
        <p id="login-error" style="color: red; margin-top: 1rem; display: none;">סיסמה שגויה, נסה שנית.</p>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <div class="header-actions">
            <h2>ניהול פוסטים</h2>
            <div>
                <button id="add-post-btn" class="btn">הוסף פוסט חדש +</button>
                <button id="logout-btn" class="btn btn-small btn-danger" style="margin-right: 10px;">יציאה</button>
            </div>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>תאריך</th>
                    <th>כותרת</th>
                    <th>פעולות</th>
                </tr>
            </thead>
            <tbody id="posts-list">
                <!-- Posts will be listed here -->
            </tbody>
        </table>
    </div>
</main>

<!-- Post Modal (Add/Edit) -->
<div id="post-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title">הוספת פוסט חדש</h2>
        <form id="post-form">
            <input type="hidden" id="post-id">
            <div class="form-group">
                <label for="title">כותרת הפוסט</label>
                <input type="text" id="post-title" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="image">כתובת תמונה (URL או נתיב מקומי)</label>
                <input type="text" id="post-image" class="form-control" placeholder="למשל: ../קטלוג דיגיטלי/catalog/logo.png">
            </div>
            <div class="form-group">
                <label for="content">תוכן הפוסט</label>
                <textarea id="post-content" class="form-control" required></textarea>
            </div>
            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                <button type="button" id="close-modal" class="btn btn-danger">ביטול</button>
                <button type="submit" class="btn btn-primary">שמור פוסט</button>
            </div>
        </form>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
