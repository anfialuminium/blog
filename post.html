<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אנפי - פוסט</title>
    <link rel="icon" type="image/png" href="../catalog/favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .post-header {
            margin-bottom: 2rem;
        }
        .post-full-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }
        .post-content-text {
            font-size: 1.2rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html">
        <img src="logo white.png" alt="אנפי לוגו" class="logo">
    </a>
    <div style="margin-bottom: 1rem;">
        <a href="../catalog/index.html" class="btn btn-small" style="background: white; color: var(--primary); border: 2px solid var(--accent);">חזרה לקטלוג המוצרים</a>
    </div>
    <h1>הבלוג של אנפי</h1>
</header>

<main class="container">
    <a href="index.html" class="back-link">&rarr; חזרה לכל הפוסטים</a>
    
    <div id="post-container">
        <!-- Post content will be loaded here -->
    </div>
</main>

<footer>
    <p>&copy; 2024 אנפי יבוא ושיווק בע"מ | כל הזכויות שמורות</p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        const container = document.getElementById('post-container');

        if (!postId) {
            container.innerHTML = '<h2>הפוסט לא נמצא.</h2><p><a href="index.html">חזרה לבלוג</a></p>';
            return;
        }

        try {
            const { data: post, error } = await supabaseClient
                .from('blog_posts')
                .select('*')
                .eq('id', postId)
                .single();

            if (error || !post) throw error || new Error('Post not found');

            document.title = `אנפי - ${post.title}`;
            const dateFormatted = new Date(post.created_at).toLocaleDateString('he-IL');
            
            container.innerHTML = `
                <div class="post-header">
                    <h1>${post.title}</h1>
                    <div class="post-meta">
                        <span>פורסם בתאריך: ${dateFormatted}</span>
                    </div>
                </div>
                ${post.image_url ? `<img src="${post.image_url}" class="post-full-image" alt="${post.title}">` : ''}
                <div class="post-content-text">${post.content}</div>
            `;
        } catch (error) {
            console.error('Error fetching post:', error);
            container.innerHTML = '<h2>הפוסט לא נמצא או שיש שגיאת תקשורת.</h2><p><a href="index.html">חזרה לבלוג</a></p>';
        }
    });
</script>
</body>
</html>
